<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Properties in CSS | WEB DEVELOPMENT</title>
    <style>
        #ck{
            color:darkred;
        }
        #hc{
            color: #007c00;
        }
        #rgbac{
            color:rgba(41, 77, 176, 0.98);
        }
        #rgbc{
            color:rgb(207, 55, 0);
        }
        #hslc{
            color:hsl(317, 100%, 50%)
        }
        .heading5{
            background-color: rgb(42, 11, 0);
            color:rgb(255, 68, 0);
            border:2px solid rgb(255, 68, 0);
        }
    </style>
</head>

<body>
    
    <p>
        <h5 class="heading5">COLOR PROPERTIES IN CSS</h5>
        <ol>
            <li id="ck">Color Keywords</li>
            <li id="hc">HEX Color Codes</li>
            <li id="rgbac">RGBA</li>
            <li id="rgbc">RGB (RED , GREEN , BLUE)</li>
            <li id="hslc">HSL (HUE, Saturation, Lightness)</li>
        </ol>
    </p>

</body>

</html>
