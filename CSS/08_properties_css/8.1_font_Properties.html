<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Properties in CSS | WEB DEVELOPMENT</title>
    <style>
        .fp{
            font-family:'poppins' , 'Segoe Ui';
            font-style:'italic';
            font-weight:500;
        }
    </style>
</head>

<body>
    
    <div>
        <p>hey my name is Abdul Haseeb Memon</p><span>This is before applying property</span>
    </div>

    <div class="fp">
        <p>hey my name is Abdul Haseeb Memon</p><span>This is after applying property</span>
    </div>

</body>

</html>
